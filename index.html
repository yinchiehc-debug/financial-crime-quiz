<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>檢測金融犯罪防制DNA </title>title>
<style>
  :root{
    --bg1:#eef2f7;
    --bg2:#dfe6ef;
    --card:#ffffff;
    --text:#162033;
    --muted:#6b7280;
    --line:#e7ebf2;
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --secondary:#f8fafc;
    --secondary-border:#dbe3ee;
    --correct-bg:#ecfdf3;
    --correct-border:#86efac;
    --wrong-bg:#fff1f2;
    --wrong-border:#fda4af;
    --feedback-bg:#fff7ed;
    --feedback-text:#9a3412;
    --memory-bg:#eff6ff;
    --memory-text:#1d4ed8;
    --shadow:0 18px 45px rgba(15,23,42,.10);
    --radius-xl:28px;
    --radius-lg:18px;
    --radius-md:14px;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,.85), transparent 20%),
      radial-gradient(circle at 80% 15%, rgba(255,255,255,.65), transparent 18%),
      radial-gradient(circle at 75% 75%, rgba(255,255,255,.55), transparent 20%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding:28px 18px 48px;
  }

  .wrap{
    max-width:1020px;
    margin:0 auto;
  }

  .board{
    background:rgba(255,255,255,.72);
    border:1px solid rgba(255,255,255,.55);
    backdrop-filter: blur(12px);
    border-radius:36px;
    padding:18px;
    box-shadow:var(--shadow);
  }

  .card{
    background:var(--card);
    border-radius:var(--radius-xl);
    box-shadow:0 8px 28px rgba(15,23,42,.06);
    padding:26px 28px;
    animation:fadeUp .42s ease;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }

  .title-group{
    text-align:left;
  }

  .title{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:26px;
    font-weight:800;
    letter-spacing:.2px;
  }

  .title-icon{
    width:40px;
    height:40px;
    border-radius:14px;
    display:grid;
    place-items:center;
    font-size:20px;
    background:linear-gradient(135deg, #eef4ff, #f8faff);
    box-shadow: inset 0 0 0 1px #e6ecf5;
  }

  .subtitle{
    margin:10px 0 0;
    color:var(--muted);
    font-size:15px;
    line-height:1.7;
  }

  .status-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .pill{
    min-width:108px;
    padding:12px 14px;
    border-radius:999px;
    background:#f7f9fc;
    border:1px solid #edf1f6;
    color:#25314a;
    font-weight:700;
    font-size:15px;
    text-align:center;
  }

  .pill.small{
    min-width:auto;
    padding:10px 14px;
    font-size:14px;
  }

  .timer.danger{
    color:#b91c1c;
    background:#fff1f2;
    border-color:#fecdd3;
    animation:blink .7s infinite;
  }

  .intro-block{
    padding:30px 8px 8px;
    text-align:center;
  }

  .intro-title{
    font-size:36px;
    font-weight:900;
    margin:4px 0 12px;
    letter-spacing:.5px;
  }

  .intro-desc{
    max-width:680px;
    margin:0 auto 24px;
    color:var(--muted);
    line-height:1.9;
    font-size:17px;
  }

  .legend{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:22px;
  }

  .legend span{
    background:#f8fafc;
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 14px;
    color:#475569;
    font-size:14px;
    font-weight:700;
  }

  .btn{
    appearance:none;
    border:none;
    cursor:pointer;
    border-radius:16px;
    padding:14px 22px;
    font-weight:800;
    font-size:17px;
    transition:.2s ease;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }

  .btn-primary{
    background:linear-gradient(135deg, var(--primary), var(--primary-dark));
    color:white;
    box-shadow:0 12px 24px rgba(37,99,235,.22);
  }

  .btn-primary:hover{
    transform:translateY(-1px) scale(1.01);
  }

  .btn-secondary{
    background:var(--secondary);
    color:#1f2a44;
    border:1px solid var(--secondary-border);
  }

  .btn-secondary:hover{
    transform:translateY(-1px);
    background:#f1f5f9;
  }

  .question-meta{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:999px;
    background:#f8fafc;
    border:1px solid var(--line);
    color:#475569;
    font-size:14px;
    font-weight:700;
  }

  .progress-wrap{
    margin:6px 0 18px;
  }

  .progress-track{
    width:100%;
    height:10px;
    background:#edf2f7;
    border-radius:999px;
    overflow:hidden;
  }

  .progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, #60a5fa, #2563eb);
    border-radius:999px;
    transition:width .35s ease;
  }

  .question{
    font-size:31px;
    line-height:1.55;
    text-align:left;
    margin:18px 0 10px;
    font-weight:900;
    white-space:pre-line;
  }

  .question-hint{
    text-align:left;
    color:var(--muted);
    font-size:16px;
    margin-bottom:18px;
  }

  .options{
    display:grid;
    gap:14px;
  }

  .option{
    width:100%;
    background:#fff;
    border:1.5px solid #e8edf5;
    border-radius:20px;
    padding:18px 20px;
    text-align:left;
    line-height:1.8;
    font-size:18px;
    font-weight:700;
    color:#172033;
    box-shadow:0 2px 8px rgba(15,23,42,.02);
    transition:.2s ease;
  }

  .option:hover{
    transform:translateY(-1px);
    border-color:#c9d7ee;
    background:#fbfdff;
  }

  .option:disabled{
    cursor:not-allowed;
    opacity:1;
  }

  .option.correct{
    background:var(--correct-bg) !important;
    border-color:var(--correct-border) !important;
    animation:bounce .42s ease;
  }

  .option.wrong{
    background:var(--wrong-bg) !important;
    border-color:var(--wrong-border) !important;
    animation:shake .32s ease;
  }

  .feedback-area{
    display:none;
    margin-top:18px;
    text-align:left;
    animation:fadeUp .25s ease;
  }

  .feedback-box{
    padding:16px 18px;
    border-radius:18px;
    background:var(--feedback-bg);
    color:var(--feedback-text);
    line-height:1.85;
    font-size:17px;
    border:1px solid #fed7aa;
    margin-bottom:12px;
  }

  .memory-box{
    padding:16px 18px;
    border-radius:18px;
    background:var(--memory-bg);
    color:var(--memory-text);
    line-height:1.85;
    font-size:16px;
    font-weight:800;
    border:1px solid #bfdbfe;
  }

  .result-shell{
    text-align:center;
    padding:22px 12px 10px;
  }

  .result-score{
    font-size:60px;
    font-weight:900;
    margin:8px 0 12px;
    letter-spacing:1px;
  }

  .result-title{
    font-size:36px;
    font-weight:900;
    margin:4px 0 10px;
    line-height:1.35;
  }

  .result-comment{
    max-width:720px;
    margin:0 auto 20px;
    color:#374151;
    line-height:2;
    font-size:18px;
    white-space:pre-line;
  }

  .cta-panel{
    max-width:760px;
    margin:18px auto 0;
    padding:18px;
    background:#f8fafc;
    border:1px solid #e5edf7;
    border-radius:22px;
  }

  .cta-title{
    font-size:18px;
    font-weight:900;
    margin-bottom:8px;
  }

  .cta-text{
    color:#5b667a;
    line-height:1.8;
    margin-bottom:16px;
    font-size:15px;
  }

  .cta-actions{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .result-footer{
    color:#667085;
    font-size:15px;
    margin-top:16px;
  }

  .footer-quote{
    margin-top:18px;
    font-size:16px;
    font-weight:800;
    color:#344256;
  }

  .hidden{ display:none; }

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }

  @keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-4px);}
    100%{transform:translateX(0);}
  }

  @keyframes bounce{
    0%{transform:scale(1);}
    50%{transform:scale(1.04);}
    100%{transform:scale(1);}
  }

  @keyframes blink{
    50%{opacity:.35;}
  }

  @media (max-width: 768px){
    body{ padding:14px 10px 28px; }
    .board{ border-radius:26px; padding:10px; }
    .card{ padding:18px 16px; border-radius:22px; }
    .topbar{ gap:12px; }
    .title{ font-size:22px; }
    .question{ font-size:24px; }
    .option{ font-size:16px; padding:16px; }
    .result-score{ font-size:46px; }
    .result-title{ font-size:28px; }
    .pill{ min-width:auto; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="board">

    <div class="card" id="startPage">
      <div class="topbar">
        <div class="title-group">
          <div class="title">
            <div class="title-icon">🎯</div>
            <div>金融犯罪防制情境測驗</div>
          </div>
          <p class="subtitle">以情境題快速檢測你對反貪污與賄賂、利益衝突、詐欺防制與檢舉制度的風險敏感度。</p>
        </div>
      </div>

      <div class="intro-block">
        <div class="intro-title">快問快答挑戰</div>
        <p class="intro-desc">
          每次隨機抽 5 題。會告訴你是「金融犯罪終結者」還是「風險盲盒開箱王」。
        </p>
        <div class="legend">
        </div>
        <button class="btn btn-primary" onclick="startQuiz()">開始挑戰</button>
      </div>
    </div>

    <div class="card hidden" id="quizPage">
      <div class="topbar">
        <div class="title-group">
          <div class="title">
            <div class="title-icon">🧭</div>
            <div id="gameTitle">風險雷達檢測</div>
          </div>
        </div>

        <div class="status-row">
          <div class="pill small" id="qNo">第 1 / 5 題</div>
          <div class="pill small" id="scoreBoard">得分 0</div>
          <div class="pill small timer" id="timer">⏱ 18 秒</div>
        </div>
      </div>

      <div class="question-meta">
        <div class="badge" id="category">分類</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <h2 class="question" id="question"></h2>
      <div class="question-hint">選一個最貼近你直覺的答案。</div>
      <div class="options" id="options"></div>

      <div class="feedback-area" id="feedbackArea">
        <div class="feedback-box" id="feedback"></div>
        <div class="memory-box" id="memory"></div>
      </div>
    </div>

    <div class="card hidden" id="resultPage">
      <div class="topbar">
        <div class="title-group">
          <div class="title">
            <div class="title-icon">🏁</div>
            <div>挑戰完成</div>
          </div>
        </div>
        <div class="status-row">
          <div class="pill small" id="finalQCount">第 5 / 5 題</div>
          <div class="pill small" id="finalScoreBoard">得分 0</div>
        </div>
      </div>

      <div class="result-shell">
        <div class="result-score" id="finalScore">4/5</div>
        <div class="result-title" id="resultTitle">🟩《風險雷達已開啟》</div>
        <div class="result-comment" id="comment"></div>

        <div class="cta-panel">
          <div class="cta-title">完成挑戰後，下一步</div>
          <div class="cta-text">
            歡迎填寫意見回饋，幫助我們優化教材；也可以回到 Sway 專刊複習完整內容。
          </div>
          <div class="cta-actions">
            <a class="btn btn-primary" id="formsLink" href="#" target="_blank" rel="noopener noreferrer">📝 填寫意見調查</a>
            <a class="btn btn-secondary" id="swayLink" href="#" target="_blank" rel="noopener noreferrer">📘 回到 Sway 教材</a>
            <button class="btn btn-secondary" onclick="location.reload()">🔄 再玩一次</button>
          </div>
        </div>

        <div class="footer-quote" id="finalQuote"></div>
        <div class="result-footer">不確定的時候，就是該先停一下、先問一下的時候。</div>
      </div>
    </div>

  </div>
</div>

<script>
// ===== 請改成你自己的連結 =====
const FORMS_URL = "https://forms.office.com/Pages/ResponsePage.aspx?id=XjAHcGQma065pMTVzP0VJPu2FmqdX8BIkOY7zfIYsEJURTM2RUY2UVVHRkFNMUVGUVRZOFJKSlQ2SS4u";
const SWAY_URL = "https://sway.cloud.microsoft/0RbrGNdSFncEKVkB?ref=Link";

// ===== 結果頁按鈕連結 =====
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("formsLink").href = FORMS_URL;
  document.getElementById("swayLink").href = SWAY_URL;
});

const questionBank = [
  {
    cat:"🟠 反貪污與賄賂（ABC）",
    q:"Q1｜專案結束後的「感謝禮」\n\n專案剛結案一週，你收到廠商寄來的高價禮盒，卡片寫「感謝協助、沒有其他意思」。你心想：都結束了，應該OK吧？你最該做的是：",
    options:[
      "A. 收下就好，反正不是現金",

      "漂亮！關鍵是透明＋可稽核。"
    ],
    memory:"👉 專案前後的禮物，最容易變成「人情帳」。"
  },
  {
    cat:"🟠 反貪污與賄賂（ABC）",
    q:"Q2｜關鍵時點的餐敘\n\n你正要參與續約評估，廠商說「先吃個飯聊近況，不談條件」。同桌還有對方另一位主管，看起來很正式。你比較適當的做法是：",
    options:[

    ],
    a:1,
    feedback:[
      "不談條件也能談氛圍，氛圍會影響判斷。",
      "很棒！你是在保護自己也保護團隊決策。",
      "你付錢不代表「時點風險」消失，續約前就是敏感。"
    ],
    memory:"👉 敏感時點的社交＝放大鏡。"
  },
  {
    cat:"🟠 反貪污與賄賂（ABC）",
    q:"Q3｜招待升等與「順便」安排\n\n你出差拜訪合作方，對方說「都幫你安排好了」，包含升等艙、飯店升級與司機接送，並說「這只是禮遇」。你應該：",
    options:[
      "A. 接受，因為你沒有開口要",

      "C. 接受但之後送小禮回禮就平衡了"
    ],
    a:1,
    feedback:[
      "對方多做一步，就是要你少做一步（少做思考）。",
      "對！必要與超額要切清楚。",
      "回禮不是洗白，是把風險「變成雙向」。"
    ],
    memory:"👉 超出必要的款待，通常不是單純好意。"
  },
  {
    cat:"🟠 反貪污與賄賂（ABC）",
    q:"Q4｜紅包想換工作機會\n\n你在活動場合遇到對方說想應徵你們公司，離開前塞了一個紅包：「請你幫忙把履歷往上遞一下」。最適當處置：",

    memory:"👉 不收不做還不夠，要「可證明」。"

  {
    cat:"🟠 反貪污與賄賂（ABC）",

  {

    ],
    memory:"👉 COI 不是偏袒才算，是「看起來」就有風險。"
  },

function getRandomQuestions(arr, n){
  return [...arr].sort(() => Math.random() - 0.5).slice(0, n);
}

let quizSet = [];
let current = 0;
let score = 0;
let timer = null;
let timeLeft = 18;
let answered = false;

function startQuiz(){
  quizSet = getRandomQuestions(questionBank, 5);
  current = 0;
  score = 0;
  document.getElementById("startPage").classList.add("hidden");
  document.getElementById("resultPage").classList.add("hidden");
  document.getElementById("quizPage").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  answered = false;
  const q = quizSet[current];

  document.getElementById("qNo").innerText = `第 ${current + 1} / 5 題`;
  document.getElementById("scoreBoard").innerText = `得分 ${score}`;
  document.getElementById("category").innerText = q.cat;
  document.getElementById("question").innerText = q.q;
  document.getElementById("feedbackArea").style.display = "none";
  document.getElementById("feedback").innerText = "";
  document.getElementById("memory").innerText = "";
  document.getElementById("progressBar").style.width = `${((current) / 5) * 100}%`;

  const gameTitle = q.cat.includes("COI")
    ? "COI 雷達檢測"
    : q.cat.includes("ABC")
    ? "ABC 風險辨識"
    : q.cat.includes("FRAUD")
    ? "Fraud 雷達檢測"
    : "Speak Out 雷達檢測";

  document.getElementById("gameTitle").innerText = gameTitle;

  let optionsHtml = "";
  q.options.forEach((opt, i) => {
    optionsHtml += `<button class="option" onclick="selectAnswer(${i})">${opt}</button>`;
  });
  document.getElementById("options").innerHTML = optionsHtml;

  startTimer();
}

function startTimer(){
  clearInterval(timer);
  timeLeft = 18;
  const timerEl = document.getElementById("timer");
  timerEl.classList.remove("danger");
  timerEl.innerText = `⏱ ${timeLeft} 秒`;

  timer = setInterval(() => {
    timeLeft--;
    timerEl.innerText = `⏱ ${timeLeft} 秒`;
    if(timeLeft <= 3){
      timerEl.classList.add("danger");
    }
    if(timeLeft <= 0){
      clearInterval(timer);
      if(!answered){
        handleTimeout();
      }
    }
  }, 1000);
}

function selectAnswer(idx){
  if(answered) return;
  answered = true;
  clearInterval(timer);

  const q = quizSet[current];
  const buttons = document.querySelectorAll(".option");

  buttons.forEach((b, id) => {
    if(id === q.a) b.classList.add("correct");
    if(id === idx && id !== q.a) b.classList.add("wrong");
    b.disabled = true;
  });

  if(idx === q.a){
    score++;
    document.getElementById("scoreBoard").innerText = `得分 ${score}`;
  }

  showFeedback(q, idx);
  document.getElementById("progressBar").style.width = `${((current + 1) / 5) * 100}%`;
  setTimeout(nextQuestion, 2800);
}

function handleTimeout(){
  answered = true;
  const q = quizSet[current];
  const buttons = document.querySelectorAll(".option");
  buttons.forEach((b, id) => {
    if(id === q.a) b.classList.add("correct");
    b.disabled = true;
  });

  document.getElementById("feedbackArea").style.display = "block";
  document.getElementById("feedback").innerText = "⏰ 時間到！風險通常不會等你想完才發生。";
  document.getElementById("memory").innerText = q.memory;
  document.getElementById("progressBar").style.width = `${((current + 1) / 5) * 100}%`;

  setTimeout(nextQuestion, 2500);
}

function showFeedback(q, selectedIdx){
  document.getElementById("feedbackArea").style.display = "block";
  const prefix = selectedIdx === q.a ? "✅ " : "😆 ";
  document.getElementById("feedback").innerText = prefix + q.feedback[selectedIdx];
  document.getElementById("memory").innerText = q.memory;
}

function nextQuestion(){
  current++;
  if(current < 5){
    showQuestion();
  }else{
    showResult();
  }
}

function showResult(){
  document.getElementById("quizPage").classList.add("hidden");
  document.getElementById("resultPage").classList.remove("hidden");

  document.getElementById("finalQCount").innerText = "第 5 / 5 題";
  document.getElementById("finalScoreBoard").innerText = `得分 ${score}`;
  document.getElementById("finalScore").innerText = `${score}/5`;

  let title = "";
  let comment = "";
  let quote = "";

  if(score <= 1){
    title = "🟥《風險盲盒開箱王》";
    comment = "你今天不是在答題，是在開盲盒：每一題都在賭「應該沒事吧」。\n好消息是：你願意玩，就代表你已經比很多人早一步。";
    quote = "👉 先停一下，再動手。";
  } else if(score === 2){
    title = "🟧《差一點就中招型》";
    comment = "你其實有警覺，但很容易被三個字催眠：急、熟、順。\n下次只要多做一件事：把「確認」變成本能，你就會穩很多。";
    quote = "👉 越急越要驗、越熟越要說、越順越要查。";
  } else if(score === 3){
    title = "🟨《流程守門員（偶爾心軟）》";
    comment = "大部分你都選得很漂亮，只有少數題目被「人情或效率」偷走一分。\n你已經具備風險直覺，下一步是：遇到尷尬時點，也敢把流程講出口。";
    quote = "👉 該說的要說，該走的要走（走流程）。";
  } else if(score === 4){
    title = "🟩《風險雷達已開啟》";
    comment = "你很會抓關鍵：知道什麼時候該停、該問、該確認。\n你今天少的一分，通常不是不懂，而是情境太像日常——這才是高手難題。";
    quote = "👉 先確認，再決定。";
  } else {
    title = "🟦《風險拆彈王（滿分通關）》";
    comment = "恭喜滿分！你不是在避風險，你是在讓風險沒機會出生。\n請把這份直覺帶回工作現場：你會是團隊最穩的那個人。";
    quote = "👉 有疑慮就停、有關係就說、有例外就驗、有異常就報。";
  }

  document.getElementById("resultTitle").innerText = title;
  document.getElementById("comment").innerText = comment;
  document.getElementById("finalQuote").innerText = quote;
}

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>快問快答挑戰</title>
<style>
  :root{
    --bg1:#eef2f7;
    --bg2:#dfe6ef;
    --card:#ffffff;
    --text:#162033;
    --muted:#6b7280;
    --line:#e7ebf2;
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --secondary:#f8fafc;
    --secondary-border:#dbe3ee;
    --correct-bg:#ecfdf3;
    --correct-border:#86efac;
    --wrong-bg:#fff1f2;
    --wrong-border:#fda4af;
    --feedback-bg:#fff7ed;
    --feedback-text:#9a3412;
    --memory-bg:#eff6ff;
    --memory-text:#1d4ed8;
    --shadow:0 18px 45px rgba(15,23,42,.10);
    --radius-xl:28px;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,.85), transparent 20%),
      radial-gradient(circle at 80% 15%, rgba(255,255,255,.65), transparent 18%),
      radial-gradient(circle at 75% 75%, rgba(255,255,255,.55), transparent 20%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding:28px 18px 48px;
  }

  .wrap{ max-width:1020px; margin:0 auto; }

  .board{
    background:rgba(255,255,255,.72);
    border:1px solid rgba(255,255,255,.55);
    backdrop-filter: blur(12px);
    border-radius:36px;
    padding:18px;
    box-shadow:var(--shadow);
  }

  .card{
    background:#fff;
    border-radius:var(--radius-xl);
    box-shadow:0 8px 28px rgba(15,23,42,.06);
    padding:26px 28px;
    animation:fadeUp .42s ease;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }

  .title-group{ text-align:left; }

  .title{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:26px;
    font-weight:800;
    letter-spacing:.2px;
  }

  .title-icon{
    width:40px;
    height:40px;
    border-radius:14px;
    display:grid;
    place-items:center;
    font-size:20px;
    background:linear-gradient(135deg,#eef4ff,#f8faff);
    box-shadow: inset 0 0 0 1px #e6ecf5;
    animation:iconPop .5s ease;
  }


  .title-text{
    font-weight:900;
    letter-spacing:1px;
    opacity:0;
    transform:translateY(10px);
    animation:titleSlideIn .6s ease forwards;
  }

  .subtitle{
    margin:10px 0 0;
    color:var(--muted);
    font-size:15px;
    line-height:1.7;
  }

  .status-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .pill{
    min-width:108px;
    padding:12px 14px;
    border-radius:999px;
    background:#f7f9fc;
    border:1px solid #edf1f6;
    color:#25314a;
    font-weight:700;
    font-size:15px;
    text-align:center;
  }

  .pill.small{
    min-width:auto;
    padding:10px 14px;
    font-size:14px;
  }

  .timer{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    min-width:176px;
    padding:14px 20px !important;
    font-weight:900;
  }

  .timer #timerText{
    font-size:34px;
    line-height:1;
    letter-spacing:.3px;
  }

  .timer-light{
    width:16px;
    height:16px;
    border-radius:50%;
    background:#cbd5e1;
    box-shadow:0 0 0 rgba(239,68,68,0);
    transition:.2s ease;
    flex:0 0 auto;
  }

  .timer.danger{
    color:#b91c1c;
    background:#fff1f2;
    border-color:#fecdd3;
    animation:blink .65s infinite;
  }

  .timer.danger #timerText{
    font-size:38px;
  }

  .timer.danger .timer-light{
    width:24px;
    height:24px;
    background:#ef4444;
    box-shadow:0 0 12px rgba(239,68,68,.95), 0 0 30px rgba(239,68,68,.72);
    animation:alarmFlash .28s infinite;
  }

  .intro-block{ padding:30px 8px 8px; text-align:center; }

  .intro-title{
    font-size:36px;
    font-weight:900;
    margin:4px 0 12px;
    letter-spacing:.5px;
  }

  .intro-desc{
    max-width:680px;
    margin:0 auto 24px;
    color:var(--muted);
    line-height:1.9;
    font-size:17px;
  }

  .btn{
    appearance:none;
    border:none;
    cursor:pointer;
    border-radius:16px;
    padding:14px 22px;
    font-weight:800;
    font-size:17px;
    transition:.2s ease;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }

  .btn-primary{
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:white;
    box-shadow:0 12px 24px rgba(37,99,235,.22);
  }

  .btn-primary:hover{ transform:translateY(-1px) scale(1.01); }

  .btn-secondary{
    background:var(--secondary);
    color:#1f2a44;
    border:1px solid var(--secondary-border);
  }

  .btn-secondary:hover{
    transform:translateY(-1px);
    background:#f1f5f9;
  }

  .question-meta{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:999px;
    background:#f8fafc;
    border:1px solid var(--line);
    color:#475569;
    font-size:14px;
    font-weight:700;
  }

  .progress-wrap{ margin:6px 0 18px; }

  .progress-track{
    width:100%;
    height:10px;
    background:#edf2f7;
    border-radius:999px;
    overflow:hidden;
  }

  .progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#60a5fa,#2563eb);
    border-radius:999px;
    transition:width .35s ease;
  }

  .question{
    font-size:31px;
    line-height:1.55;
    text-align:left;
    margin:18px 0 10px;
    font-weight:900;
    white-space:pre-line;
  }

  .question-hint{
    text-align:left;
    color:var(--muted);
    font-size:16px;
    margin-bottom:18px;
  }

  .options{
    display:grid;
    gap:14px;
  }

  .option{
    width:100%;
    background:#fff;
    border:1.5px solid #e8edf5;
    border-radius:20px;
    padding:18px 20px;
    text-align:left;
    line-height:1.8;
    font-size:18px;
    font-weight:700;
    color:#172033;
    box-shadow:0 2px 8px rgba(15,23,42,.02);
    transition:.2s ease;
  }

  .option:hover{
    transform:translateY(-1px);
    border-color:#c9d7ee;
    background:#fbfdff;
  }

  .option:disabled{
    cursor:not-allowed;
    opacity:1;
  }

  .option.correct{
    background:var(--correct-bg) !important;
    border-color:var(--correct-border) !important;
    animation:bounce .42s ease;
  }

  .option.wrong{
    background:var(--wrong-bg) !important;
    border-color:var(--wrong-border) !important;
    animation:shake .32s ease;
  }

  .choice-label{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:30px;
    height:30px;
    border-radius:50%;
    background:#eff6ff;
    color:#1d4ed8;
    font-weight:900;
    margin-right:10px;
    flex:0 0 auto;
  }

  .choice-line{
    display:flex;
    align-items:flex-start;
  }

  .feedback-area{
    display:none;
    margin-top:18px;
    text-align:left;
    animation:fadeUp .25s ease;
  }

  .feedback-box{
    padding:16px 18px;
    border-radius:18px;
    background:var(--feedback-bg);
    color:var(--feedback-text);
    line-height:1.85;
    font-size:17px;
    border:1px solid #fed7aa;
    margin-bottom:12px;
  }

  .memory-box{
    padding:16px 18px;
    border-radius:18px;
    background:var(--memory-bg);
    color:var(--memory-text);
    line-height:1.85;
    font-size:16px;
    font-weight:800;
    border:1px solid #bfdbfe;
  }

  .result-shell{
    text-align:center;
    padding:22px 12px 10px;
  }

  .result-score{
    font-size:60px;
    font-weight:900;
    margin:8px 0 12px;
    letter-spacing:1px;
  }

  .result-title{
    font-size:36px;
    font-weight:900;
    margin:4px 0 10px;
    line-height:1.35;
  }

  .result-comment{
    max-width:720px;
    margin:0 auto 20px;
    color:#374151;
    line-height:2;
    font-size:18px;
    white-space:pre-line;
  }

  .cta-panel{
    max-width:760px;
    margin:18px auto 0;
    padding:18px;
    background:#f8fafc;
    border:1px solid #e5edf7;
    border-radius:22px;
  }

  .cta-title{
    font-size:18px;
    font-weight:900;
    margin-bottom:8px;
  }

  .cta-text{
    color:#5b667a;
    line-height:1.8;
    margin-bottom:16px;
    font-size:15px;
  }

  .cta-actions{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .result-footer{
    color:#667085;
    font-size:15px;
    margin-top:16px;
  }

  .footer-quote{
    margin-top:18px;
    font-size:16px;
    font-weight:800;
    color:#344256;
  }

  .chase-wrap{
    margin:12px 0 4px;
    padding:10px 0 0;
  }

  .chase-track{
    position:relative;
    width:100%;
    height:108px;
    border-radius:999px;
    background:
      linear-gradient(180deg, #fdfefe 0%, #eef4ff 100%);
    border:1px solid #dde6f2;
    overflow:hidden;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
  }

  .track-shadow{
    position:absolute;
    inset:auto 10px 12px 10px;
    height:8px;
    border-radius:999px;
    background:linear-gradient(90deg, rgba(148,163,184,.1), rgba(148,163,184,.18), rgba(148,163,184,.1));
  }

  .runner{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    line-height:1;
    transition:left .35s linear, transform .22s ease;
    user-select:none;
    z-index:2;
  }

  .runner.police{ left:6%; }
  .runner.thief{ left:74%; z-index:1; }

  .runner svg{
    width:108px;
    height:108px;
    display:block;
    overflow:visible;
    filter: drop-shadow(0 8px 10px rgba(15,23,42,.12));
  }

  .finish-line{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    font-size:22px;
    font-weight:900;
    color:#b91c1c;
    background:#fff1f2;
    border:1px solid #fecdd3;
    border-radius:999px;
    padding:8px 12px;
    letter-spacing:.4px;
    z-index:3;
  }

  .speed-lines{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:0;
    transition:.2s ease;
  }

  .speed-lines span{
    position:absolute;
    width:20px;
    height:3px;
    border-radius:999px;
    background:rgba(59,130,246,.28);
    animation:speedLine 1s linear infinite;
  }

  .speed-lines span:nth-child(1){ left:14%; top:22px; animation-delay:0s; }
  .speed-lines span:nth-child(2){ left:28%; top:60px; animation-delay:.2s; }
  .speed-lines span:nth-child(3){ left:44%; top:32px; animation-delay:.45s; }
  .speed-lines span:nth-child(4){ left:58%; top:68px; animation-delay:.65s; }
  .speed-lines span:nth-child(5){ left:70%; top:26px; animation-delay:.85s; }

  .chase-wrap.danger .speed-lines{ opacity:1; }

  .chase-wrap.danger .chase-track{
    background:linear-gradient(180deg, #fff8f5 0%, #fff1f2 100%);
    border-color:#fbcfe8;
    box-shadow:0 0 0 2px rgba(239,68,68,.05), inset 0 1px 0 rgba(255,255,255,.8);
  }

  .chase-wrap.danger .runner.police{ animation:policeSprint .24s infinite; }
  .chase-wrap.danger .runner.thief{ animation:thiefScurry .14s infinite; }

  .chase-wrap.caught .runner.police{
    left:69% !important;
    transform:translateY(-50%) scale(1.08);
  }

  .chase-wrap.caught .runner.thief{
    left:75% !important;
    transform:translateY(-50%) scale(.82);
    opacity:.55;
  }

  .chase-wrap.caught .finish-line{
    background:#fee2e2;
    color:#991b1b;
    border-color:#fca5a5;
    animation:alarmFlash .36s infinite;
  }

  .hidden{ display:none; }

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }

  @keyframes titleSlideIn{
    from{opacity:0; transform:translateY(12px);}
    to{opacity:1; transform:translateY(0);}
  }

  @keyframes iconPop{
    0%{ transform:scale(.8); opacity:0; }
    60%{ transform:scale(1.1); }
    100%{ transform:scale(1); opacity:1; }
  }

  @keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-4px);}
    100%{transform:translateX(0);}
  }

  @keyframes bounce{
    0%{transform:scale(1);}
    50%{transform:scale(1.04);}
    100%{transform:scale(1);}
  }

  @keyframes blink{
    50%{opacity:.35;}
  }

  @keyframes alarmFlash{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:.28; transform:scale(1.22); }
  }

  @keyframes policeSprint{
    0%,100%{ transform:translateY(-50%) scale(1); }
    50%{ transform:translateY(-54%) scale(1.04); }
  }

  @keyframes thiefScurry{
    0%,100%{ transform:translateY(-50%) translateX(0) scale(1); }
    25%{ transform:translateY(-47%) translateX(2px) scale(1.03); }
    50%{ transform:translateY(-52%) translateX(4px) scale(1.06); }
    75%{ transform:translateY(-48%) translateX(2px) scale(1.03); }
  }

  @keyframes speedLine{
    0%{ transform:translateX(0); opacity:0; }
    20%{ opacity:.75; }
    100%{ transform:translateX(28px); opacity:0; }
  }

  @media (max-width: 768px){
    body{ padding:14px 10px 28px; }
    .board{ border-radius:26px; padding:10px; }
    .card{ padding:18px 16px; border-radius:22px; }
    .topbar{ gap:12px; }
    .title{ font-size:22px; }
    .question{ font-size:24px; }
    .option{ font-size:16px; padding:16px; }
    .result-score{ font-size:46px; }
    .result-title{ font-size:28px; }
    .pill{ min-width:auto; }
    .timer{ min-width:144px; }
    .timer #timerText{ font-size:26px; }
    .runner svg{ width:56px; height:56px; }
    .chase-track{ height:84px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="board">

    <div class="card" id="startPage">
      <div class="topbar">
        <div class="title-group">
          <div class="title">
            <div class="title-icon">🎯</div>
            <div>檢測金融犯罪防制DNA</div>
          </div>
          <p class="subtitle">以情境題快速檢測你對反貪污與賄賂、利益衝突、詐欺防制與檢舉制度的風險敏感度。</p>
        </div>
      </div>

      <div class="intro-block">
        <div class="intro-title">快問快答挑戰</div>
        <p class="intro-desc">
          每次隨機抽 5 題，16 秒內做出判斷。看看你能不能在風險跑掉前，成功做出正確決策。
        </p>
        <button class="btn btn-primary" onclick="startQuiz()">開始挑戰</button>
      </div>
    </div>

    <div class="card hidden" id="quizPage">
      <div class="topbar">
        <div class="title-group">
          <div class="title">
            <div class="title-icon">⚡</div>
            <div id="gameTitle" class="title-text">快問快答挑戰</div>
          </div>
        </div>

        <div class="status-row">
          <div class="pill small" id="qNo">第 1 / 5 題</div>
          <div class="pill small" id="scoreBoard">得分 0</div>
          <div class="pill small timer" id="timer">
            <span class="timer-light"></span>
            <span id="timerText">⏱ 16 秒</span>
          </div>
        </div>
      </div>

      <div class="chase-wrap" id="chaseWrap" aria-hidden="true">
        <div class="chase-track">
          <div class="track-shadow"></div>
          <div class="speed-lines"><span></span><span></span><span></span><span></span><span></span></div>

          <div class="runner police" id="policeRunner">
            <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="policeHat" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#3766d1"/>
                  <stop offset="100%" stop-color="#1c3f95"/>
                </linearGradient>
              </defs>

              <ellipse cx="72" cy="132" rx="14" ry="9" fill="#1f2937" opacity=".16"/>
              <ellipse cx="103" cy="132" rx="14" ry="9" fill="#1f2937" opacity=".16"/>

              <ellipse cx="84" cy="97" rx="34" ry="28" fill="#2457c6"/>
              <ellipse cx="84" cy="103" rx="24" ry="18" fill="#173b88"/>

              <g transform="translate(38 82) rotate(-20)">
                <ellipse cx="18" cy="12" rx="18" ry="10" fill="#2457c6"/>
                <circle cx="5" cy="12" r="7" fill="#ffd7bf"/>
              </g>
              <g transform="translate(103 80) rotate(20)">
                <ellipse cx="18" cy="12" rx="18" ry="10" fill="#2457c6"/>
                <circle cx="35" cy="13" r="7" fill="#ffd7bf"/>
                <circle cx="43" cy="18" r="9" fill="none" stroke="#6b7280" stroke-width="4"/>
                <rect x="32" y="13" width="10" height="4" rx="2" fill="#6b7280"/>
              </g>

              <g transform="translate(55 112) rotate(8)">
                <ellipse cx="15" cy="10" rx="13" ry="9" fill="#173b88"/>
                <ellipse cx="10" cy="19" rx="12" ry="7" fill="#1f2937"/>
              </g>
              <g transform="translate(90 112) rotate(-18)">
                <ellipse cx="15" cy="10" rx="13" ry="9" fill="#173b88"/>
                <ellipse cx="10" cy="19" rx="12" ry="7" fill="#1f2937"/>
              </g>

              <circle cx="84" cy="57" r="30" fill="#ffd9c2"/>
              <circle cx="62" cy="52" r="6" fill="#ffd9c2"/>
              <circle cx="106" cy="52" r="6" fill="#ffd9c2"/>

              <path d="M57 51 Q63 30 86 31 Q103 32 111 45 Q101 38 92 41 Q79 28 57 51 Z" fill="#4b2e22"/>

              <ellipse cx="84" cy="35" rx="31" ry="10" fill="url(#policeHat)"/>
              <path d="M56 34 Q84 12 112 34 L108 48 Q84 41 60 48 Z" fill="url(#policeHat)"/>
              <rect x="58" y="42" width="52" height="7" rx="3.5" fill="#102a68"/>
              <circle cx="84" cy="31" r="8" fill="#ffd34d" stroke="#e3a600" stroke-width="2"/>

              <circle cx="73" cy="59" r="8.5" fill="#2b1d16"/>
              <circle cx="95" cy="59" r="8.5" fill="#2b1d16"/>
              <circle cx="76" cy="56" r="2.3" fill="#fff"/>
              <circle cx="98" cy="56" r="2.3" fill="#fff"/>

              <circle cx="63" cy="69" r="5" fill="#ffb4b4" opacity=".65"/>
              <circle cx="105" cy="69" r="5" fill="#ffb4b4" opacity=".65"/>

              <path d="M79 72 Q84 79 89 72" stroke="#b84e4e" stroke-width="3" fill="none" stroke-linecap="round"/>
              <circle cx="84" cy="67" r="2.2" fill="#b84e4e"/>

              <circle cx="84" cy="90" r="3" fill="#ffd34d"/>
              <circle cx="84" cy="101" r="3" fill="#ffd34d"/>

              <circle cx="31" cy="104" r="9" fill="none" stroke="#808796" stroke-width="4"/>
              <rect x="31" y="94" width="8" height="4" rx="2" fill="#808796"/>
            </svg>
          </div>

          <div class="runner thief" id="thiefRunner">
            <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <ellipse cx="84" cy="132" rx="34" ry="10" fill="#1f2937" opacity=".12"/>

              <path d="M106 73 Q133 76 130 100 Q127 120 103 114 Q91 111 88 95 Q84 76 106 73 Z" fill="#8b5a2b"/>
              <path d="M100 73 Q112 62 117 52 Q116 67 126 73 Z" fill="#9a6735"/>
              <circle cx="108" cy="94" r="7" fill="#d7b46a"/>
              <path d="M108 88 V100 M102 94 H114" stroke="#8b5a2b" stroke-width="2"/>

              <ellipse cx="76" cy="96" rx="31" ry="25" fill="#1f2937"/>
              <ellipse cx="76" cy="102" rx="21" ry="14" fill="#444b57"/>

              <g transform="translate(48 88) rotate(-22)">
                <ellipse cx="14" cy="10" rx="16" ry="9" fill="#1f2937"/>
                <circle cx="2" cy="10" r="6" fill="#ffd7bf"/>
              </g>
              <g transform="translate(90 89) rotate(18)">
                <ellipse cx="14" cy="10" rx="16" ry="9" fill="#1f2937"/>

    feedback:["你提過≠事情處理過；風險不會因為你按過送出鍵就消失。","對！AML 的關鍵是可追蹤的升級紀錄。","只等指示，通常等到的是「出事通知」。"],
    memory:"👉 提報要能追蹤，風險才會真的被處理。"
  },
  {
    cat:"🟢 檢舉制度（Speak Out）",
    q:"Q20｜我怕被貼標籤／被報復\n\n你想檢舉，但擔心「講了會不會被貼上愛找麻煩的標籤？」或影響日後合作。你也不確定公司是否真的會保護你。最合理的做法：",
    options:["先觀望，確定不會被發現再說","使用公司正式檢舉管道（匿名／保密），保留事實、讓制度保護你","私下跟同事說，請他去檢舉"],
    a:1,
    feedback:["風險不會等你做好心理建設才發生。","正確！制度存在就是要讓你安全地說。","把別人推上去不是保護，是把風險「外包」。"],
    memory:"👉 用制度說話，比用膽量硬撐更安全。"
  }
];

function shuffleQuestionOptions(question){
  const items = question.options.map((opt, index) => ({
    opt,
    feedback: question.feedback[index],
    isCorrect: index === question.a
  }));

  for(let i = items.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }

  return {
    ...question,
    options: items.map(item => item.opt),
    feedback: items.map(item => item.feedback),
    a: items.findIndex(item => item.isCorrect)
  };
}

function getRandomQuestions(arr, n){
  return [...arr]
    .sort(() => Math.random() - 0.5)
    .slice(0, n)
    .map(q => shuffleQuestionOptions(q));
}

function resetChaseAnimation(){
  const chaseWrap = document.getElementById("chaseWrap");
  const cat = document.getElementById("policeRunner");
  const mouse = document.getElementById("thiefRunner");
  if(!chaseWrap || !cat || !mouse) return;
  chaseWrap.classList.remove("danger", "caught");
  cat.style.left = "6%";
  mouse.style.left = "74%";
}

function updateChaseAnimation(timeLeft){
  const chaseWrap = document.getElementById("chaseWrap");
  const police = document.getElementById("policeRunner");
  const thief = document.getElementById("thiefRunner");
  if(!chaseWrap || !police || !thief) return;

  const totalTime = 16;
  const progress = (totalTime - timeLeft) / totalTime;

  const policeLeft = 6 + (63 * progress);
  const thiefLeft = 74 + (8 * progress);

  police.style.left = `${Math.min(policeLeft, 69)}%`;
  thief.style.left = `${Math.min(thiefLeft, 82)}%`;

  if(timeLeft <= 5 && timeLeft > 0){
    chaseWrap.classList.add("danger");
  } else {
    chaseWrap.classList.remove("danger");
  }

  if(timeLeft <= 0){
    chaseWrap.classList.add("caught");
  }
}

let quizSet = [];
let current = 0;
let score = 0;
let timer = null;
let timeLeft = 16;
let answered = false;

function startQuiz(){
  quizSet = getRandomQuestions(questionBank, 5);
  current = 0;
  score = 0;
  document.getElementById("startPage").classList.add("hidden");
  document.getElementById("resultPage").classList.add("hidden");
  document.getElementById("quizPage").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  answered = false;
  const q = quizSet[current];

  document.getElementById("qNo").innerText = `第 ${current + 1} / 5 題`;
  document.getElementById("scoreBoard").innerText = `得分 ${score}`;
  document.getElementById("category").innerText = q.cat;
  document.getElementById("question").innerText = q.q;
  document.getElementById("feedbackArea").style.display = "none";
  document.getElementById("feedback").innerText = "";
  document.getElementById("memory").innerText = "";
  document.getElementById("progressBar").style.width = `${(current / 5) * 100}%`;

  let optionsHtml = "";
  const labels = ["A","B","C","D"];

  q.options.forEach((opt, i) => {
    optionsHtml += `
      <button class="option" onclick="selectAnswer(${i})">
        <div class="choice-line">
          <span class="choice-label">${labels[i]}</span>
          <span>${opt}</span>
        </div>
      </button>
    `;
  });

  document.getElementById("options").innerHTML = optionsHtml;
  resetChaseAnimation();
  startTimer();
}

function startTimer(){
  clearInterval(timer);
  timeLeft = 16;

  const timerEl = document.getElementById("timer");
  const timerTextEl = document.getElementById("timerText");

  timerEl.classList.remove("danger");
  timerTextEl.innerText = `⏱ ${timeLeft} 秒`;

  updateChaseAnimation(timeLeft);

  timer = setInterval(() => {
    timeLeft--;
    timerTextEl.innerText = `⏱ ${timeLeft} 秒`;

    if(timeLeft <= 5 && timeLeft > 0){
      timerEl.classList.add("danger");
    } else {
      timerEl.classList.remove("danger");
    }

    updateChaseAnimation(timeLeft);

    if(timeLeft <= 0){
      clearInterval(timer);
      if(!answered){
        handleTimeout();
      }
    }
  }, 1000);
}

function selectAnswer(idx){
  if(answered) return;
  answered = true;
  clearInterval(timer);

  const q = quizSet[current];
  const buttons = document.querySelectorAll(".option");

  buttons.forEach((b, id) => {
    if(id === q.a) b.classList.add("correct");
    if(id === idx && id !== q.a) b.classList.add("wrong");
    b.disabled = true;
  });

  if(idx === q.a){
    score++;
    document.getElementById("scoreBoard").innerText = `得分 ${score}`;
  }

  showFeedback(q, idx);
  document.getElementById("progressBar").style.width = `${((current + 1) / 5) * 100}%`;
  setTimeout(nextQuestion, 2800);
}

function handleTimeout(){
  answered = true;
  updateChaseAnimation(0);

  const q = quizSet[current];
  const buttons = document.querySelectorAll(".option");
  buttons.forEach((b, id) => {
    if(id === q.a) b.classList.add("correct");
    b.disabled = true;
  });

  const timeoutMessages = [
    "🚨 時間到！小偷已經快跑到終點了。",
    "👮 慢了一拍，這題被時間帶走了。",
    "⏰ 來不及判斷，風險先往前跑了。",
    "💨 這題猶豫太久，小偷差點溜走。"
  ];

  const randomMsg = timeoutMessages[Math.floor(Math.random() * timeoutMessages.length)];

  document.getElementById("feedbackArea").style.display = "block";
  document.getElementById("feedback").innerText = randomMsg;
  document.getElementById("memory").innerText = q.memory;
  document.getElementById("progressBar").style.width = `${((current + 1) / 5) * 100}%`;

  setTimeout(nextQuestion, 2500);
}

function showFeedback(q, selectedIdx){
  document.getElementById("feedbackArea").style.display = "block";
  const prefix = selectedIdx === q.a ? "✅ " : "😆 ";
  document.getElementById("feedback").innerText = prefix + q.feedback[selectedIdx];
  document.getElementById("memory").innerText = q.memory;
}

function showResult(){
  document.getElementById("quizPage").classList.add("hidden");
  document.getElementById("resultPage").classList.remove("hidden");

  document.getElementById("finalQCount").innerText = "第 5 / 5 題";
  document.getElementById("finalScoreBoard").innerText = `得分 ${score}`;
  document.getElementById("finalScore").innerText = `${score}/5`;

  let title = "";
  let comment = "";
  let quote = "";

  if(score <= 1){
    title = "🟥《風險盲盒開箱王》";
    comment = "你今天不是在答題，是在開盲盒：每一題都在賭「應該沒事吧」。\n好消息是：你願意玩，就代表你已經比很多人早一步。";
    quote = "👉 先停一下，再動手。";
  } else if(score === 2){
    title = "🟧《風險邊緣人》";
    comment = "你其實有警覺，但很容易被三個字催眠：急、熟、順。\n下次只要多做一件事：把「確認」變成本能，你就會穩很多。";
    quote = "👉 越急越要驗、越熟越要說、越順越要查。";
  } else if(score === 3){
    title = "🟨《風險守門員（偶爾心軟）》";
    comment = "大部分你都選得很漂亮，只有少數題目被「人情或效率」偷走一分。\n你已經具備風險直覺，下一步是：遇到尷尬時點，也敢把流程講出口。";
    quote = "👉 該說的要說，該走的要走（走流程）。";
  } else if(score === 4){
    title = "🟩《風險雷達員》";
    comment = "你很會抓關鍵：知道什麼時候該停、該問、該確認。\n你今天少的一分，通常不是不懂，而是情境太像日常——這才是高手難題。";
    quote = "👉 先確認，再決定。";
  } else {
    title = "🟦《風險終結者（完美拆彈）》";
    comment = "恭喜滿分！你不是在避風險，你是在讓風險沒機會出生。\n請把這份直覺帶回工作現場：你會是團隊最穩的那個人。";
    quote = "👉 有疑慮就停、有關係就說、有例外就驗、有異常就報。";
  }

  document.getElementById("resultTitle").innerText = title;
  document.getElementById("comment").innerText = comment;
  document.getElementById("finalQuote").innerText = quote;
}

function nextQuestion(){
  current++;
  if(current < 5){
    showQuestion();
  }else{
    showResult();
  }
}
</script>

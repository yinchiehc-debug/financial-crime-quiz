<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融犯罪防制快問快答</title>
<style>
  body {
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    text-align: center;
    background: #f5f7fb;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 760px;
    margin: auto;
  }

  .card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    margin-top: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  h1 {
    margin-bottom: 10px;
  }

  button {
    margin: 10px;
    padding: 12px 20px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    font-size: 16px;
  }

  .main-btn {
    background: #2563eb;
    color: white;
  }

  .main-btn:hover {
    background: #1d4ed8;
  }

  .option {
    display: block;
    width: 100%;
    margin: 10px 0;
    background: #eef2ff;
    color: #111827;
  }

  .option:hover {
    background: #dbeafe;
  }

  .option:disabled {
    cursor: not-allowed;
    opacity: 1;
  }

  .correct {
    background: #dcfce7 !important;
  }

  .wrong {
    background: #fee2e2 !important;
  }

  .feedback-box {
    margin-top: 18px;
    padding: 16px;
    border-radius: 12px;
    background: #fff7ed;
    color: #7c2d12;
    line-height: 1.7;
  }

  .memory-box {
    margin-top: 12px;
    padding: 14px;
    border-radius: 12px;
    background: #eff6ff;
    color: #1e3a8a;
    line-height: 1.7;
  }

  #timer {
    font-size: 18px;
    font-weight: bold;
    margin-top: 16px;
  }

  #score {
    font-size: 28px;
    font-weight: bold;
    line-height: 1.8;
  }

  .small {
    color: #6b7280;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>金融犯罪防制快問快答</h1>

  <div class="card" id="startPage">
    <p>隨機抽 5 題，看看你的風險敏感度有多高。</p>
    <button class="main-btn" onclick="startQuiz()">開始測驗</button>
  </div>

  <div class="card" id="quizPage" style="display:none;">
    <h3 id="qNo"></h3>
    <h2 id="question"></h2>
    <div id="options"></div>
    <p id="timer"></p>

    <div id="feedbackArea" style="display:none;">
      <div class="feedback-box" id="feedbackText"></div>
      <div class="memory-box" id="memoryText"></div>
    </div>
  </div>

  <div class="card" id="resultPage" style="display:none;">
    <h2>完成！</h2>
    <div id="score"></div>
    <p class="small">再玩一次，題目會重新隨機抽出。</p>
    <button class="main-btn" onclick="location.reload()">再玩一次</button>
  </div>
</div>

<script>
const questionBank = [
  {
    q: "送高價禮盒但未明講回報，是否有風險？",
    options: ["沒有", "看金額", "可能不當利益", "只有現金才算"],
    a: 2,
    memory: "重點不是形式，而是有沒有影響公正判斷。",
    roast: "你這題如果選錯，已經快把『不當利益』包裝成精美伴手禮了。"
  },
  {
    q: "親友公司參與招標需要揭露嗎？",
    options: ["不用", "看情況", "需要", "不用理"],
    a: 2,
    memory: "利益衝突看的是『可能影響』，不是等真的出事才算。",
    roast: "你是不是差點把『利益衝突』理解成『只是剛好很熟』？"
  },
  {
    q: "同一人負責收款＋對帳風險是？",
    options: ["效率高", "沒問題", "缺乏職務分工", "不影響"],
    a: 2,
    memory: "一人包辦不是神，是內控警報器。",
    roast: "這題選錯的話，舞弊者可能想頒你『最佳配合獎』。"
  },
  {
    q: "檢舉制度最重要的是？",
    options: ["匿名", "獎金", "禁止報復", "主管支持"],
    a: 2,
    memory: "沒有人身保護，制度再漂亮也沒人敢用。",
    roast: "你如果選錯，等於把檢舉制度做成了一個華麗但沒人敢按的按鈕。"
  },
  {
    q: "降低金融犯罪最有效方式？",
    options: ["懲罰", "流程", "文化+內控+通報", "業績"],
    a: 2,
    memory: "真正有效的是多層防線，不是只靠一招。",
    roast: "只靠單一方法防金融犯罪，跟拿雨傘骨架去擋颱風差不多。"
  },
  {
    q: "供應商招待旅遊應該？",
    options: ["接受", "低調去", "先申請", "不用理"],
    a: 2,
    memory: "外部招待要先依規定揭露與申請，不要先玩再說。",
    roast: "這題選錯的話，那趟旅遊很可能會從員工福利變成稽核案例。"
  },
  {
    q: "同事突然變很有錢代表？",
    options: ["成功", "沒事", "可能異常", "羨慕"],
    a: 2,
    memory: "異常不等於有罪，但一定值得留意。",
    roast: "如果你的第一反應是羨慕，不是警覺，風險意識可能真的在休假。"
  },
  {
    q: "大家都這樣做可以當理由嗎？",
    options: ["可以", "看情況", "不可以", "主管同意就可以"],
    a: 2,
    memory: "常見不代表正確，文化不能凌駕規範。",
    roast: "『大家都這樣』通常正是事故報告最愛出現的開場白。"
  }
];

function getRandomQuestions(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

let quizSet = [];
let current = 0;
let score = 0;
let timer;
let timeLeft = 10;
let answered = false;

function startQuiz() {
  quizSet = getRandomQuestions(questionBank, 5);
  current = 0;
  score = 0;

  document.getElementById("startPage").style.display = "none";
  document.getElementById("resultPage").style.display = "none";
  document.getElementById("quizPage").style.display = "block";

  showQuestion();
}

function showQuestion() {
  answered = false;
  let q = quizSet[current];

  document.getElementById("qNo").innerText = `第 ${current + 1} / 5 題`;
  document.getElementById("question").innerText = q.q;
  document.getElementById("feedbackArea").style.display = "none";
  document.getElementById("feedbackText").innerHTML = "";
  document.getElementById("memoryText").innerHTML = "";

  let optionsHtml = "";
  q.options.forEach((opt, i) => {
    optionsHtml += `<button class="option" onclick="selectAnswer(${i}, this)">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = optionsHtml;

  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = 10;
  document.getElementById("timer").innerText = `⏳ ${timeLeft} 秒`;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = `⏳ ${timeLeft} 秒`;

    if (timeLeft <= 0) {
      clearInterval(timer);
      if (!answered) {
        handleTimeout();
      }
    }
  }, 1000);
}

function selectAnswer(i) {
  if (answered) return;
  answered = true;
  clearInterval(timer);

  let q = quizSet[current];
  let buttons = document.querySelectorAll(".option");

  buttons.forEach((b, idx) => {
    if (idx === q.a) b.classList.add("correct");
    if (idx === i && idx !== q.a) b.classList.add("wrong");
    b.disabled = true;
  });

  let feedbackMsg = "";

  if (i === q.a) {
    score++;
    const praiseList = [
      "✅ 答對了！你的金融犯罪雷達有開。",
      "✅ 正確！這題沒騙過你。",
      "✅ 命中重點！風險嗅覺不錯喔。",
      "✅ 很可以！你有抓到關鍵。",
      "✅ 這題穩了，你不是隨便猜的。"
    ];
    feedbackMsg = praiseList[Math.floor(Math.random() * praiseList.length)];
  } else {
    feedbackMsg = `😆 答錯啦！${q.roast}`;
  }

  showFeedback(feedbackMsg, q.memory);
  setTimeout(nextQuestion, 2200);
}

function handleTimeout() {
  answered = true;
  let q = quizSet[current];
  let buttons = document.querySelectorAll(".option");

  buttons.forEach((b, idx) => {
    if (idx === q.a) b.classList.add("correct");
    b.disabled = true;
  });

  showFeedback("⏰ 時間到！這題猶豫太久，風險可不會等你。", q.memory);
  setTimeout(nextQuestion, 2200);
}

function showFeedback(feedback, memory) {
  document.getElementById("feedbackArea").style.display = "block";
  document.getElementById("feedbackText").innerHTML = feedback;
  document.getElementById("memoryText").innerHTML = `🧠 記憶點：${memory}`;
}

function nextQuestion() {
  current++;
  if (current < 5) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quizPage").style.display = "none";
  document.getElementById("resultPage").style.display = "block";

  let message = "";
  let emoji = "";

  if (score === 5) {
    emoji = "🏆";
    message = "滿分！你根本是金融犯罪防制界的鷹眼。";
  } else if (score === 4) {
    emoji = "🔥";
    message = "差一點封神，你的風險敏感度已經很不錯。";
  } else if (score === 3) {
    emoji = "😏";
    message = "中間偏強，但還有幾題差點被風險牽著走。";
  } else if (score === 2) {
    emoji = "⚠️";
    message = "有點危險，建議先不要跟詐騙集團正面對決。";
  } else {
    emoji = "🚨";
    message = "今天先當練習賽，快回去補強金融犯罪防制觀念。";
  }

  document.getElementById("score").innerHTML =
    `${emoji} ${score} / 5<br><span style="font-size:20px;">${message}</span>`;
}
</script>

</body>
</html>

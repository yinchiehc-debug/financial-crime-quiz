<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融犯罪防制快問快答</title>

<style>
body { font-family: Arial; background:#f5f7fb; text-align:center; }
.container { max-width:750px; margin:auto; padding:20px; }
.card { background:white; padding:20px; border-radius:15px; margin-top:20px; }
button { padding:12px; margin:8px; border:none; border-radius:8px; cursor:pointer; }
.option { width:100%; background:#eef2ff; }
.correct { background:#c7f9cc !important; }
.wrong { background:#ffc9c9 !important; }
#timer { font-weight:bold; }
.feedback { margin-top:10px; }
.memory { color:#2563eb; font-weight:bold; }
</style>
</head>

<body>

<div class="container">

<h1>金融犯罪防制快問快答</h1>

<div class="card" id="startPage">
<p>隨機5題｜看看你有沒有金融犯罪第六感 😏</p>
<button onclick="startQuiz()">開始挑戰</button>
</div>

<div class="card" id="quizPage" style="display:none;">
<h3 id="qNo"></h3>
<h4 id="category"></h4>
<h2 id="question"></h2>
<div id="options"></div>
<p id="timer"></p>

<div id="feedbackArea" style="display:none;">
<p class="feedback" id="feedback"></p>
<p class="memory" id="memory"></p>
</div>
</div>

<div class="card" id="resultPage" style="display:none;">
<h2 id="result"></h2>
<p id="finalComment"></p>
<button onclick="location.reload()">再玩一次</button>
</div>

</div>

<script>

const questionBank = [
{cat:"ABC",q:"送禮未要求回報是否有風險？",options:["沒有","看金額","可能不當利益","只有現金"],a:2,
memory:"重點是是否影響判斷",
roast:"你是不是差點把賄賂當成精緻人情？"},

{cat:"COI",q:"親友公司投標要揭露嗎？",options:["不用","看情況","需要","不用理"],a:2,
memory:"有關係就要揭露",
roast:"『只是認識』通常就是風險的起點"},

{cat:"Fraud",q:"一人負責收款+對帳風險？",options:["效率高","沒問題","缺乏分工","不影響"],a:2,
memory:"一人包辦=高風險",
roast:"舞弊者看到這種流程會很感動"},

{cat:"WB",q:"檢舉制度最重要？",options:["匿名","獎金","禁止報復","主管"],a:2,
memory:"沒保護就沒人敢檢舉",
roast:"這樣的制度只會長灰塵"},

{cat:"ABC",q:"供應商招待旅遊？",options:["接受","低調","先申請","忽略"],a:2,
memory:"招待需核准",
roast:"旅遊結束可能換你被調查"},

{cat:"Fraud",q:"同事突然變有錢？",options:["成功","沒事","異常","羨慕"],a:2,
memory:"異常需留意",
roast:"你第一反應如果是羨慕，有點危險喔"},

{cat:"COI",q:"未揭露兼職風險？",options:["沒事","太累","利益衝突","形象"],a:2,
memory:"兼職需揭露",
roast:"雙重身份=雙倍風險"},

{cat:"Fraud",q:"資料修改沒紀錄？",options:["沒事","效率","舞弊","正常"],a:2,
memory:"需可追溯",
roast:"沒紀錄就像沒發生（但其實發生了）"},

{cat:"ABC",q:"小額禮品沒問題？",options:["是","不是","看主管","看心情"],a:1,
memory:"金額小仍可能影響",
roast:"小額只是試水溫"},

{cat:"WB",q:"發現異常應？",options:["忽略","等","通報","自己查"],a:2,
memory:"通報最重要",
roast:"問題不會自己消失，只會變大"},

{cat:"Fraud",q:"長期不休假？",options:["努力","正常","潛在風險","好員工"],a:2,
memory:"強制休假可揭露風險",
roast:"太完美反而要小心"},

{cat:"COI",q:"主管叫跳流程？",options:["照做","拒絕","依規定","看心情"],a:2,
memory:"流程不能跳",
roast:"跳流程=跳進風險"},

{cat:"Fraud",q:"帳號共用？",options:["可以","方便","禁止","沒差"],a:2,
memory:"帳號不可共用",
roast:"責任也會一起消失"},

{cat:"ABC",q:"大家都這樣？",options:["可以","看情況","不可以","主管"],a:2,
memory:"文化不能凌駕規範",
roast:"事故報告第一句"},

{cat:"WB",q:"證據不足要通報？",options:["不用","等","要","看"],a:2,
memory:"通報不是定罪",
roast:"你不是偵探"},

{cat:"Fraud",q:"異常交易？",options:["忽略","等","通報","處理"],a:2,
memory:"立即通報",
roast:"拖越久越大條"},

{cat:"COI",q:"與供應商太熟？",options:["沒事","正常","需揭露","忽略"],a:2,
memory:"關係需透明",
roast:"太熟就會出事"},

{cat:"ABC",q:"招待不報備？",options:["可以","低調","不行","沒差"],a:2,
memory:"需事前核准",
roast:"低調不是解決方案"},

{cat:"Fraud",q:"高報費用？",options:["正常","技巧","舞弊","沒差"],a:2,
memory:"異常需查",
roast:"數字不會說謊"},

{cat:"WB",q:"不通報後果？",options:["沒事","小事","風險擴大","正常"],a:2,
memory:"不通報=放大風險",
roast:"問題會長大"}
];

// ===== 隨機5題 =====
function getRandom(arr,n){
return [...arr].sort(()=>Math.random()-0.5).slice(0,n);
}

let quiz=[],i=0,score=0,timer,t=10,answered=false;

function startQuiz(){
quiz=getRandom(questionBank,5);
i=0;score=0;
document.getElementById("startPage").style.display="none";
document.getElementById("quizPage").style.display="block";
showQ();
}

function showQ(){
answered=false;
let q=quiz[i];
document.getElementById("qNo").innerText=`第 ${i+1}/5題`;
document.getElementById("category").innerText=q.cat;
document.getElementById("question").innerText=q.q;

let html="";
q.options.forEach((o,idx)=>{
html+=`<button class="option" onclick="ans(${idx})">${o}</button>`;
});
document.getElementById("options").innerHTML=html;
document.getElementById("feedbackArea").style.display="none";

startTimer();
}

function startTimer(){
clearInterval(timer);t=10;
timer=setInterval(()=>{
document.getElementById("timer").innerText="⏳ "+t;
t--;
if(t<0){clearInterval(timer);next();}
},1000);
}

function ans(idx){
if(answered)return;
answered=true;
clearInterval(timer);

let q=quiz[i];
let btns=document.querySelectorAll(".option");

btns.forEach((b,id)=>{
if(id===q.a)b.classList.add("correct");
if(id===idx&&id!==q.a)b.classList.add("wrong");
b.disabled=true;
});

let msg="";
if(idx===q.a){
score++;
const praise=["🧠 有第六感！","🔥 很會判斷！","😎 風險抓到了！","💯 可以！"];
msg=praise[Math.floor(Math.random()*praise.length)];
}else{
msg="😆 "+q.roast;
}

document.getElementById("feedbackArea").style.display="block";
document.getElementById("feedback").innerText=msg;
document.getElementById("memory").innerText="🧠 "+q.memory;

setTimeout(next,2000);
}

function next(){
i++;
if(i<5)showQ();
else result();
}

function result(){
document.getElementById("quizPage").style.display="none";
document.getElementById("resultPage").style.display="block";

let title="",comment="";

if(score===5){
title="🏆 金融犯罪雷達王";
comment="詐騙看到你都會繞路走";
}else if(score>=4){
title="🔥 風險高手";
comment="已具備不錯判斷力";
}else if(score>=3){
title="😏 還行";
comment="偶爾會被套路";
}else if(score>=2){
title="⚠️ 有點危險";
comment="詐騙可能會找上你";
}else{
title="🚨 高風險";
comment="建議立刻補課";
}

document.getElementById("result").innerText=`${title} (${score}/5)`;
document.getElementById("finalComment").innerText=comment;
}
</script>

</body>
</html>

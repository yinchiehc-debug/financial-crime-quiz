<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融犯罪防制測驗</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  text-align:center;
}

.container { max-width:750px; margin:auto; padding:20px; }

.card {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
  animation: fadeIn 0.6s;
}

button {
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.option {
  width:100%;
  background:#eef2ff;
}

.option:hover {
  transform:scale(1.02);
}

.correct {
  background:#bbf7d0 !important;
  animation: bounce 0.5s;
}

.wrong {
  background:#fecaca !important;
  animation: shake 0.4s;
}

/* 倒數動畫 */
#timer {
  font-weight:bold;
  font-size:20px;
}

.danger {
  color:red;
  animation: blink 0.6s infinite;
}

/* 動畫 */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

@keyframes shake {
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}

@keyframes bounce {
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

@keyframes blink {
  50%{opacity:0;}
}

#result {
  font-size:30px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>金融犯罪判斷挑戰</h1>

<div class="card" id="startPage">
<p>隨機5題｜看看你有沒有風險第六感 😏</p>
<button onclick="startQuiz()">開始挑戰</button>
</div>

<div class="card" id="quizPage" style="display:none;">
<h3 id="qNo"></h3>
<h4 id="category"></h4>
<h2 id="question"></h2>
<div id="options"></div>
<p id="timer"></p>

<div id="feedbackArea" style="display:none;">
<p id="feedback"></p>
<p id="memory"></p>
</div>
</div>

<div class="card" id="resultPage" style="display:none;">
<h2 id="result"></h2>
<p id="comment"></p>
<button onclick="location.reload()">再玩一次</button>
</div>

</div>

<script>

const questionBank = [
{cat:"ABC",q:"供應商提供顧問費加速流程？",
options:["可以","市場常見","不可以","看金額"],
a:2,
memory:"影響決策＝風險",
roast:"這不是顧問費，是快捷鍵"},
{cat:"COI",q:"朋友公司投標需揭露？",
options:["不用","看情況","需要","不用理"],
a:2,
memory:"可能影響就要揭露",
roast:"太熟通常就出事"},
{cat:"Fraud",q:"一人收款+對帳？",
options:["效率","沒事","風險","不影響"],
a:2,
memory:"職務分工很重要",
roast:"舞弊會謝謝你"},
{cat:"WB",q:"檢舉最重要？",
options:["匿名","獎金","防報復","主管"],
a:2,
memory:"沒保護沒人檢舉",
roast:"制度會長灰塵"},
{cat:"Fraud",q:"異常交易？",
options:["等","忽略","通報","處理"],
a:2,
memory:"通報優先",
roast:"拖會變更嚴重"}
];

// ===== 隨機 =====
function getRandom(arr,n){
return [...arr].sort(()=>Math.random()-0.5).slice(0,n);
}

let quiz=[],i=0,score=0,timer,t=10,answered=false;

function startQuiz(){
quiz=getRandom(questionBank,5);
i=0;score=0;
document.getElementById("startPage").style.display="none";
document.getElementById("quizPage").style.display="block";
showQ();
}

function showQ(){
answered=false;
let q=quiz[i];

document.getElementById("qNo").innerText=`第 ${i+1}/5題`;
document.getElementById("category").innerText=q.cat;
document.getElementById("question").innerText=q.q;

let html="";
q.options.forEach((o,idx)=>{
html+=`<button class="option" onclick="ans(${idx})">${o}</button>`;
});
document.getElementById("options").innerHTML=html;
document.getElementById("feedbackArea").style.display="none";

startTimer();
}

function startTimer(){
clearInterval(timer);
t=10;

timer=setInterval(()=>{
let timerEl=document.getElementById("timer");
timerEl.innerText="⏳ "+t;

if(t<=3){
timerEl.classList.add("danger");
}else{
timerEl.classList.remove("danger");
}

t--;

if(t<0){
clearInterval(timer);
next();
}
},1000);
}

function ans(idx){
if(answered)return;
answered=true;
clearInterval(timer);

let q=quiz[i];
let btns=document.querySelectorAll(".option");

btns.forEach((b,id)=>{
if(id===q.a)b.classList.add("correct");
if(id===idx&&id!==q.a)b.classList.add("wrong");
b.disabled=true;
});

let msg="";
if(idx===q.a){
score++;
const praise=["🔥 太強了","😎 你有第六感","💯 完全命中"];
msg=praise[Math.floor(Math.random()*praise.length)];
}else{
msg="😆 "+q.roast;
}

document.getElementById("feedbackArea").style.display="block";
document.getElementById("feedback").innerText=msg;
document.getElementById("memory").innerText="🧠 "+q.memory;

setTimeout(next,2000);
}

function next(){
i++;
if(i<5)showQ();
else result();
}

function result(){
document.getElementById("quizPage").style.display="none";
document.getElementById("resultPage").style.display="block";

let title="",comment="";

if(score===5){
title="🏆 神級風險雷達";
comment="詐騙看到你會繞路";
}else if(score>=4){
title="🔥 高手";
comment="你很難被騙";
}else if(score>=3){
title="😏 還行";
comment="偶爾會被套路";
}else if(score>=2){
title="⚠️ 小心";
comment="風險在靠近你";
}else{
title="🚨 危險";
comment="詐騙最愛你這種";
}

document.getElementById("result").innerText=`${title} (${score}/5)`;
document.getElementById("comment").innerText=comment;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快問快答挑戰</title>

<style>
body{
  font-family:"Segoe UI","Microsoft JhengHei";
  background:#eef2f7;
  margin:0;
  padding:12px;
}

/* ===== 標題 ===== */
.title{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:20px;
  margin-bottom:6px;
}

.title-icon{
  font-size:20px;
  animation:iconPop 0.5s ease;
}

.title-text{
  font-weight:900;
  letter-spacing:1px;
  opacity:0;
  transform:translateY(8px);
  animation:titleSlideIn 0.5s ease forwards;
}

@keyframes titleSlideIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes iconPop{
  0%{ transform:scale(0.8); opacity:0;}
  60%{ transform:scale(1.1);}
  100%{ transform:scale(1); opacity:1;}
}

/* ===== 跑道 ===== */
.track{
  position:relative;
  height:70px;
  background:#fff;
  border-radius:40px;
  margin:6px 0;
  overflow:hidden;
}

/* 角色 */
.runner{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  transition:left .3s linear;
}

/* 縮小角色 */
.runner{
  font-size:26px;
}

/* 起始位置 */
.police{ left:6%; }
.thief{ left:74%; }

/* 動畫 */
.danger .police{ animation:policeRun .2s infinite;}
.danger .thief{ animation:thiefRun .14s infinite;}

@keyframes policeRun{
  0%,100%{ transform:translateY(-50%)}
  50%{ transform:translateY(-54%)}
}

@keyframes thiefRun{
  0%,100%{ transform:translateY(-50%)}
  50%{ transform:translateY(-48%) translateX(3px)}
}

/* 計時 */
.timer{
  font-size:20px;
  font-weight:bold;
  margin-bottom:4px;
}

/* 問題 */
h2{
  font-size:18px;
  margin:8px 0;
}

/* 選項 */
button{
  padding:10px;
  margin:6px 0;
  width:100%;
  font-size:15px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.correct{ background:#dcfce7;}
.wrong{ background:#fee2e2;}

</style>
</head>

<body>

<!-- 標題 -->
<div class="title">
  <div class="title-icon">⚡</div>
  <div class="title-text">快問快答挑戰</div>
</div>

<!-- 計時 -->
<div class="timer" id="timer">16</div>

<!-- 跑道 -->
<div class="track" id="track">

  <div class="runner police" id="police">🚓</div>
  <div class="runner thief" id="thief">🏃‍♂️</div>

</div>

<!-- 問題 -->
<h2 id="question"></h2>
<div id="options"></div>

<script>

const questions = [
  {q:"收到廠商禮盒，你該？",options:["收下","藏起來","申報"],a:2},
  {q:"主管急件付款？",options:["立刻付","先確認","找同事"],a:1}
];

let current=0;
let score=0;
let time=16;
let timer;
let answered=false;

function start(){
  showQ();
  startTimer();
}

function showQ(){
  answered=false;
  let q=questions[current];
  document.getElementById("question").innerText=q.q;

  let html="";
  q.options.forEach((o,i)=>{
    html+=`<button onclick="ans(${i})">${o}</button>`;
  });
  document.getElementById("options").innerHTML=html;

  resetRun();
}

function startTimer(){
  clearInterval(timer);
  time=16;
  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText=time;

    updateRun();

    if(time<=0){
      clearInterval(timer);
      next();
    }
  },1000);
}

function updateRun(){
  let progress=(16-time)/16;

  let police=6+63*progress;
  let thief=74+8*progress;

  document.getElementById("police").style.left=police+"%";
  document.getElementById("thief").style.left=thief+"%";

  if(time<=5){
    document.getElementById("track").classList.add("danger");
  }
}

function resetRun(){
  document.getElementById("track").classList.remove("danger");
  document.getElementById("police").style.left="6%";
  document.getElementById("thief").style.left="74%";
}

function ans(i){
  if(answered) return;
  answered=true;
  clearInterval(timer);

  let q=questions[current];
  let btns=document.querySelectorAll("button");

  btns.forEach((b,id)=>{
    if(id===q.a) b.classList.add("correct");
    if(id===i && id!==q.a) b.classList.add("wrong");
  });

  if(i===q.a) score++;

  setTimeout(next,1200);
}

function next(){
  current++;
  if(current<questions.length){
    showQ();
    startTimer();
  }else{
    alert("得分："+score);
    location.reload();
  }
}

start();

</script>

</body>
</html>

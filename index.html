<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>金融犯罪防制快問快答</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

button {
  margin: 10px;
  padding: 12px 20px;
  cursor: pointer;
  border-radius: 8px;
  border: none;
}

.option {
  display: block;
  width: 100%;
  margin: 10px 0;
  background: #eee;
}

.option:hover {
  background: #ddd;
}

.correct { background: #c8f7c5; }
.wrong { background: #f7c5c5; }
</style>
</head>

<body>

<div class="container">

<h1>金融犯罪防制快問快答</h1>

<div class="card" id="startPage">
<button onclick="startQuiz()">開始測驗</button>
</div>

<div class="card" id="quizPage" style="display:none;">
<h3 id="qNo"></h3>
<h2 id="question"></h2>
<div id="options"></div>
<p id="timer"></p>
</div>

<div class="card" id="resultPage" style="display:none;">
<h2>完成！</h2>
<h3 id="score"></h3>
<button onclick="location.reload()">再玩一次</button>
</div>

</div>

<script>

// ===== 題庫（可持續擴充） =====
const questionBank = [
{
q:"送高價禮盒但未明講回報，是否有風險？",
options:["沒有","看金額","可能不當利益","只有現金才算"],
a:2
},
{
q:"親友公司參與招標需要揭露嗎？",
options:["不用","看情況","需要","不用理"],
a:2
},
{
q:"同一人負責收款＋對帳風險是？",
options:["效率高","沒問題","缺乏職務分工","不影響"],
a:2
},
{
q:"檢舉制度最重要的是？",
options:["匿名","獎金","禁止報復","主管支持"],
a:2
},
{
q:"降低金融犯罪最有效方式？",
options:["懲罰","流程","文化+內控+通報","業績"],
a:2
},
{
q:"供應商招待旅遊應該？",
options:["接受","低調去","先申請","不用理"],
a:2
},
{
q:"同事突然變很有錢代表？",
options:["成功","沒事","可能異常","羨慕"],
a:2
},
{
q:"大家都這樣做可以當理由嗎？",
options:["可以","看情況","不可以","主管同意就可以"],
a:2
}
];

// ===== 隨機抽5題 =====
function getRandomQuestions(arr, n){
  const shuffled = [...arr].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, n);
}

let quizSet = [];
let current = 0;
let score = 0;
let timer;
let timeLeft = 10;

// ===== 開始 =====
function startQuiz(){
  quizSet = getRandomQuestions(questionBank, 5);
  current = 0;
  score = 0;

  document.getElementById("startPage").style.display = "none";
  document.getElementById("quizPage").style.display = "block";

  showQuestion();
}

// ===== 顯示題目 =====
function showQuestion(){
  let q = quizSet[current];

  document.getElementById("qNo").innerText =
    `第 ${current+1} / 5 題`;

  document.getElementById("question").innerText = q.q;

  let optionsHtml = "";
  q.options.forEach((opt, i)=>{
    optionsHtml += `<button class="option" onclick="selectAnswer(${i}, this)">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = optionsHtml;

  startTimer();
}

// ===== 倒數 =====
function startTimer(){
  clearInterval(timer);
  timeLeft = 10;

  timer = setInterval(()=>{
    document.getElementById("timer").innerText = `⏳ ${timeLeft} 秒`;
    timeLeft--;

    if(timeLeft < 0){
      clearInterval(timer);
      nextQuestion();
    }
  },1000);
}

// ===== 答題 =====
function selectAnswer(i, btn){
  clearInterval(timer);

  let q = quizSet[current];

  let buttons = document.querySelectorAll(".option");

  buttons.forEach((b, idx)=>{
    if(idx === q.a) b.classList.add("correct");
    if(idx === i && idx !== q.a) b.classList.add("wrong");
    b.disabled = true;
  });

  if(i === q.a) score++;

  setTimeout(nextQuestion, 1000);
}

// ===== 下一題 =====
function nextQuestion(){
  current++;

  if(current < 5){
    showQuestion();
  }else{
    showResult();
  }
}

// ===== 結果 =====
function showResult(){
  document.getElementById("quizPage").style.display = "none";
  document.getElementById("resultPage").style.display = "block";

  document.getElementById("score").innerText =
    `你的分數：${score} / 5`;
}

</script>

</body>
</html>
